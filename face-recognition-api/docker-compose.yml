version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: face_cache
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - face-network

  api:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: face_api
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "8001:8000"  # 👈 Changed from 8000 to 8001
    volumes:
      - ./app:/app
      - ./app/data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - face-network
    command: uvicorn app:app --host 0.0.0.0 --port 8000 --reload

volumes:
  redis_data:

networks:
  face-network:
    driver: bridge